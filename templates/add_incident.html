{% extends 'base.html' %}
{% block title %}Report Incident — WildTrack{% endblock %}
{% block page_title %}Report Incident{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('incidents') }}" class="btn btn-outline btn-sm">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:700px">
    <div class="card-header"><span class="card-title">New Poaching Incident</span></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Habitat</label>
                    <select name="habitat_id" required>
                        <option value="">Select habitat...</option>
                        {% for h in habitats %}<option value="{{ h.habitat_id }}">{{ h.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Reported By</label>
                    <select name="reported_by">
                        <option value="">Select ranger...</option>
                        {% for r in rangers %}<option value="{{ r.ranger_id }}">{{ r.full_name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group"><label>Incident Date</label><input type="date" name="incident_date" required></div>
                <div class="form-group">
                    <label>Severity</label>
                    <select name="severity">
                        {% for s in ['Low','Medium','High','Critical'] %}<option>{{ s }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        {% for s in ['Open','Under Investigation','Resolved','Closed'] %}<option>{{ s }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group"><label>Animals Affected</label><input type="number" name="animals_affected" value="0" min="0"></div>
                <div class="form-group full">
                    <label>Description</label>
                    <textarea name="description" required placeholder="Describe the incident in detail..."></textarea>
                </div>
            </div>
            <div style="margin-top:24px;display:flex;gap:12px">
                <button type="submit" class="btn btn-primary">Report Incident</button>
                <a href="{{ url_for('incidents') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
